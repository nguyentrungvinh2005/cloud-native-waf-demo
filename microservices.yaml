apiVersion: v1
kind: ConfigMap
metadata:
  name: micro-frontend-html
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fruit Store - Microservices</title>
        <style>
            body { 
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
                text-align: center; 
                margin-top: 5%; 
                background: #fdfbf7; 
            } 
            .card { 
                background: white; 
                padding: 40px; 
                display: inline-block; 
                border-radius: 12px; 
                box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
                border-top: 5px solid #2ecc71; 
            } 
            h1 { color: #2c3e50; } 
            .badge { 
                background: #2ecc71; 
                color: white; 
                padding: 6px 12px; 
                border-radius: 20px; 
                font-weight: bold; 
                font-size: 0.9em; 
            }
            .material-input {
                border: none;
                border-bottom: 2px solid #2ecc71;
                background: transparent;
                padding: 8px 0;
                font-size: 16px;
                outline: none;
                width: 80%;
                margin-top: 20px;
                transition: border-bottom-color 0.3s;
            }
            .material-input:focus {
                border-bottom: 2px solid #27ae60;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>🍉 Cửa Hàng Trái Cây E-commerce</h1>
            <h2>Kiến Trúc Vi Dịch Vụ (Microservices)</h2>
            <p>Trạng thái hạ tầng: <span class="badge">FRONTEND ĐỘC LẬP</span></p>
            <p>Giao diện đã được tách rời. Các chức năng Sản phẩm, Đơn hàng đang chạy ở Pod riêng.</p>
            <input type="text" class="material-input" placeholder="Tìm kiếm trái cây (Giao tiếp với Product Service)...">
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fruit-micro-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: micro-front
  template:
    metadata:
      labels:
        app: micro-front
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-vol
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-vol
        configMap:
          name: micro-frontend-html
---
apiVersion: v1
kind: Service
metadata:
  name: fruit-micro-frontend-svc
spec:
  type: LoadBalancer
  ports:
  - port: 80
  selector:
    app: micro-front
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fruit-micro-backend-orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: micro-orders
  template:
    metadata:
      labels:
        app: micro-orders
    spec:
      containers:
      - name: orders-api
        image: nginx:alpine
        ports:
        - containerPort: 80
